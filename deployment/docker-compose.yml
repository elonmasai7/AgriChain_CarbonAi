version: '3.8'

services:
  backend:
    build:
      context: ..
      dockerfile: deployment/Dockerfile
    ports:
      - "8000:8000"
    env_file: ../backend/.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - ../backend:/app
      - uploads:/app/uploads
    networks:
      - agrichain-net
    restart: unless-stopped

  ai-engine:
    build:
      context: ../ai-engine
      dockerfile: ../deployment/Dockerfile.ai
    ports:
      - "8001:8001"
    volumes:
      - ../ai-engine:/app
    networks:
      - agrichain-net
    restart: unless-stopped

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: agrichain
      POSTGRES_USER: agrichain
      POSTGRES_PASSWORD: agrichain
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ../database/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agrichain"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - agrichain-net
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - agrichain-net
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ../deployment/nginx/agrichain.conf:/etc/nginx/conf.d/default.conf
      - ../frontend:/usr/share/nginx/html
      - ../deployment/nginx/ssl:/etc/nginx/ssl
    depends_on:
      - backend
    networks:
      - agrichain-net
    restart: unless-stopped

volumes:
  postgres-data:
  redis-data:
  uploads:

networks:
  agrichain-net:
    driver: bridge
